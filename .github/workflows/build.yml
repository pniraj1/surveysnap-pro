name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-apk:
    name: Build Test APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Remove package-lock
        run: rm -f package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Set targetSdkVersion 35
        run: sed -i 's/targetSdk = 34/targetSdk = 35/g' android/app/build.gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/surveysnap.jks

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/surveysnap.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: surveysnap-pro-test-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  build-aab:
    name: Build Production AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Remove package-lock
        run: rm -f package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Set targetSdkVersion 35
        run: sed -i 's/targetSdk = 34/targetSdk = 35/g' android/app/build.gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/surveysnap.jks

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/surveysnap.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: surveysnap-pro-release
          path: android/app/build/outputs/bundle/release/*.aab
